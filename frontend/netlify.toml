# Hanya dipakai jika repository Git Anda **hanya** berisi folder frontend (akar = frontend).
#
# Untuk monorepo sim-krs-old (frontend + backend di satu repo), Netlify memakai
# `netlify.toml` di **akar repo** dengan `base = "frontend"` — lihat ../netlify.toml
#
# Deploy drag & drop: unggah isi folder `out` — lihat NETLIFY_DEPLOY_DRAG_DROP.md
# Deploy GitHub: lihat NETLIFY_DEPLOY_GITHUB.md

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Header keamanan dasar (efektif saat deploy memakai Git + build di Netlify,
# atau jika Anda menyertakan file `_headers` hasil copy ke `out` — lihat public/_headers)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
