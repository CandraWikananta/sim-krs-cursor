# Blueprint di akar repo (sim-krs-old): service memakai subfolder backend.
# Validasi: dari akar repo jalankan `render blueprints validate`
#
# Deploy pertama kali ke Render:
# - Sambungkan repo Git ini ke Render, lalu "Apply Blueprint", ATAU
# - Pakai `render services create` (lihat backend/RENDER_CLI.md)

services:
  - type: web
    name: sim-krs-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT run:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
